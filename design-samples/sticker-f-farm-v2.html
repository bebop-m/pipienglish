<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>方案 F2 · Kawaii 动态小鸡农场</title>
    <link rel="stylesheet" href="sticker.css" />
    <link rel="stylesheet" href="sticker-f-farm-v2.css" />
  </head>
  <body>
    <main class="sticker-app farm-v2" aria-label="日系 Kawaii 动态单词农场首页">
      <header class="sticker-topbar">
        <div class="sticker-brand"><span class="brand-face">🐥</span>皮皮のEnglish</div>
        <div class="sticker-chip">今日单词 <strong>0 / 4</strong></div>
        <div class="sticker-chip">小鸡居民 <strong>6</strong></div>
        <button class="sticker-chip motion-toggle" type="button" data-motion-toggle aria-pressed="false">动效：开</button>
        <button class="parent-button" type="button">家长</button>
      </header>

      <section class="farm-world-v2" aria-label="可互动的单词农场">
        <div class="sun-v2"></div>
        <div class="cloud-v2 cloud-one"></div>
        <div class="cloud-v2 cloud-two"></div>
        <div class="hill-v2 hill-far-v2"></div>
        <div class="hill-v2 hill-mid-v2"></div>
        <div class="grass-v2"></div>
        <div class="path-v2"></div>

        <div class="barn-v2" aria-hidden="true">
          <span class="barn-window-v2"></span>
          <span class="barn-door-v2"></span>
        </div>
        <div class="fence-v2" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>

        <section class="mission-board-v2" aria-labelledby="farm-task-title">
          <p class="k-eyebrow">DAY 06 · 今天的农场任务</p>
          <h1 id="farm-task-title">开始今天的单词！</h1>
          <p class="k-copy">4 个新朋友正在鸡舍等你。完成后，母鸡妈妈会下一颗蛋。</p>
          <div class="progress-line"><span>今日进度</span><span class="progress-track"><span></span></span><strong>0 / 4</strong></div>
          <button class="k-button" type="button">开始学习 4 个单词</button>
          <div class="mission-meta-v2"><span>约 10 分钟</span><span>🥚 今日奖励 ×1</span><span>连续第 6 天</span></div>
        </section>

        <div class="farm-hint-v2">点点小鸡，听听它们在聊什么～</div>

        <button class="farm-chick chick-one" type="button" aria-label="小鸡：Hello，你好">
          <span class="chick-talk"><strong>Hello!</strong><small>你好！</small></span>
          <span class="chick-body"><i class="chick-wing"></i><i class="chick-beak"></i><i class="chick-feet"></i></span>
        </button>
        <button class="farm-chick chick-two" type="button" aria-label="小鸡：Apple，苹果">
          <span class="chick-talk"><strong>Apple!</strong><small>苹果</small></span>
          <span class="chick-body"><i class="chick-wing"></i><i class="chick-beak"></i><i class="chick-feet"></i></span>
        </button>
        <button class="farm-chick chick-three" type="button" aria-label="小鸡：Friend，朋友">
          <span class="chick-talk"><strong>Friend!</strong><small>朋友</small></span>
          <span class="chick-body"><i class="chick-wing"></i><i class="chick-beak"></i><i class="chick-feet"></i></span>
        </button>
        <button class="farm-chick chick-four" type="button" aria-label="小鸡：Sunny，晴朗">
          <span class="chick-talk"><strong>Sunny!</strong><small>晴朗的</small></span>
          <span class="chick-body"><i class="chick-wing"></i><i class="chick-beak"></i><i class="chick-feet"></i></span>
        </button>
        <button class="farm-chick chick-five" type="button" aria-label="小鸡：Let's play，一起玩">
          <span class="chick-talk"><strong>Let's play!</strong><small>一起玩！</small></span>
          <span class="chick-body"><i class="chick-wing"></i><i class="chick-beak"></i><i class="chick-feet"></i></span>
        </button>
        <button class="farm-chick chick-six" type="button" aria-label="小鸡：Good job，做得好">
          <span class="chick-talk"><strong>Good job!</strong><small>做得好！</small></span>
          <span class="chick-body"><i class="chick-wing"></i><i class="chick-beak"></i><i class="chick-feet"></i></span>
        </button>

        <img class="farmer-group-v2" src="assets/sticker-characters-no-border.png" alt="母鸡妈妈和农场主小皮" />
      </section>
      <span class="sample-tag">方案 F2 · Kawaii 动态小鸡农场</span>
    </main>
    <script src="sticker-f-farm-v2.js"></script>
  </body>
</html>
