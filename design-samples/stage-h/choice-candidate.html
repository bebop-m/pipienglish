<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阶段 H-3 · 选择题候选</title>
    <link rel="stylesheet" href="./choice-candidate.css" />
  </head>
  <body>
    <main class="choice-candidate" data-state="ready" aria-label="H-3 选择题视觉候选">
      <div class="farm-wash" aria-hidden="true"></div>

      <header class="lesson-header">
        <button class="back-farm" type="button"><span class="back-chevron" aria-hidden="true"></span>回农场</button>
        <section class="story-progress" aria-label="今日学习进度 5 / 18">
          <div class="progress-copy"><strong>新朋友 · 第 3 步 / 3</strong><span>今日进度 5 / 18</span></div>
          <div class="progress-path"><span class="progress-fill"></span><span class="path-dot done"></span><span class="path-dot done"></span><span class="path-dot current"></span><span class="path-dot"></span></div>
          <img class="progress-hen" src="/assets/f4/mother-f3.png" alt="母鸡妈妈正在向终点走" />
        </section>
        <span class="approval-chip">H-3 视觉候选</span>
      </header>

      <section class="choice-paper">
        <div class="question-heading">
          <div>
            <p class="step-kicker">PICK THE MEANING</p>
            <h1>这个单词是什么意思？</h1>
            <p class="question-subtitle">选一个你觉得对的，不用着急。</p>
          </div>
          <button class="word-prompt" type="button" aria-label="播放单词 egg">
            <span><strong>egg</strong><small>/eɡ/</small></span>
            <span class="sound-mark" aria-hidden="true"><i></i><i></i><i></i></span>
          </button>
        </div>

        <div class="choice-grid" role="group" aria-label="请选择 egg 的中文意思">
          <button class="choice-option" data-answer="correct" type="button"><span class="option-letter">A</span><strong>鸡蛋</strong></button>
          <button class="choice-option" data-answer="wrong" type="button"><span class="option-letter">B</span><strong>母鸡</strong></button>
          <button class="choice-option" data-answer="other" type="button"><span class="option-letter">C</span><strong>苹果</strong></button>
          <button class="choice-option" data-answer="other" type="button"><span class="option-letter">D</span><strong>面包</strong></button>
        </div>

        <div class="choice-feedback" role="status">
          <div class="feedback-ready"><span class="feedback-mark" aria-hidden="true">?</span><p><strong>选一个答案吧</strong><small>想再听一遍，可以点上面的 egg。</small></p></div>
          <div class="feedback-correct"><span class="feedback-mark" aria-hidden="true">✓</span><p><strong>答对啦！egg 就是鸡蛋</strong><small>新朋友已经记住你啦。</small></p><button type="button">继续</button></div>
          <div class="feedback-retry"><span class="feedback-mark" aria-hidden="true">↶</span><p><strong>差一点，再选一次</strong><small>egg 不是母鸡。可以先听听它的声音。</small></p><button type="button">重听</button></div>
        </div>
      </section>
    </main>
    <script src="./choice-candidate.js"></script>
  </body>
</html>
