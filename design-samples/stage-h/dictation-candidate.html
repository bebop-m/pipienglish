<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阶段 H-5 · 默写题候选</title>
    <link rel="stylesheet" href="./dictation-candidate.css" />
  </head>
  <body>
    <main class="choice-candidate dictation-candidate" data-state="ready" aria-label="H-5 默写题视觉候选">
      <div class="farm-wash" aria-hidden="true"></div>

      <header class="lesson-header">
        <button class="back-farm" type="button"><span class="back-chevron" aria-hidden="true"></span>回农场</button>
        <section class="story-progress" aria-label="今日学习进度 7 / 18">
          <div class="progress-copy"><strong>默写 · 第 1 题 / 3</strong><span>今日进度 7 / 18</span></div>
          <div class="progress-path"><span class="progress-fill dictation-fill"></span><span class="path-dot done"></span><span class="path-dot current"></span><span class="path-dot"></span><span class="path-dot"></span></div>
          <img class="progress-hen" src="/assets/f4/mother-f3.png" alt="母鸡妈妈正在向终点走" />
        </section>
        <span class="approval-chip">H-5 视觉候选</span>
      </header>

      <section class="choice-paper dictation-paper">
        <div class="dictation-heading">
          <div>
            <p class="step-kicker">WRITE THE WORD</p>
            <h1>把这个词写出来</h1>
            <p>可以用键盘，也可以用你习惯的手写输入。</p>
          </div>
          <button class="meaning-prompt" type="button" aria-label="播放题目单词"><span><small>它的意思是</small><strong>鸡蛋</strong></span><span class="sound-mark" aria-hidden="true"><i></i><i></i><i></i></span></button>
        </div>

        <div class="dictation-answer-wrap">
          <label for="dictation-answer">英文答案</label>
          <input id="dictation-answer" type="text" inputmode="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="在这里写英文" maxlength="40" />
          <span class="answer-state-icon" aria-hidden="true"></span>
        </div>

        <div class="rescue-captured" role="status">
          <div class="rescue-visual" aria-hidden="true"><img src="/assets/f4/chick-f3.png" alt="" /><span>等待救援</span></div>
          <div class="rescue-copy"><p>RESCUE MISSION</p><h2>一只小鸡被抓走了</h2><span>“鸡蛋”已经进入错题库。去救援时，这个词会单独重新走一遍学习路线。</span><button type="button">先做下一题</button></div>
        </div>

        <div class="dictation-feedback" role="status">
          <div class="feedback-ready"><span class="feedback-mark">✎</span><p><strong>想好以后再提交</strong><small>大小写都可以，系统会按正常英文判断。</small></p><button class="skip-button" type="button">想不起来</button></div>
          <div class="feedback-correct"><span class="feedback-mark">✓</span><p><strong>写对啦！egg 就是鸡蛋</strong><small>这个新朋友已经会写了。</small></p><button type="button">继续</button></div>
          <div class="feedback-retry"><span class="feedback-mark">↶</span><p><strong>差一点，再写一次</strong><small>先修改答案；实在想不起来，也可以跳过。</small></p><button class="skip-button" type="button">想不起来</button></div>
        </div>

        <div class="dictation-actions"><button class="replay-word" type="button"><span class="sound-mark" aria-hidden="true"><i></i><i></i><i></i></span>重听</button><button class="submit-answer" type="button">提交答案</button></div>
      </section>
    </main>
    <script src="./dictation-candidate.js"></script>
  </body>
</html>
