<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阶段 H-6 · 课程结束页候选</title>
    <link rel="stylesheet" href="./finish-candidate.css" />
  </head>
  <body>
    <main class="finish-candidate" data-state="ready" aria-label="H-6 课程结束页视觉候选">
      <div class="finish-wash" aria-hidden="true"></div>

      <header class="finish-topbar">
        <span class="finish-brand"><span class="finish-brand-chick" aria-hidden="true"></span>皮皮のEnglish</span>
        <span class="finish-day">DAY 07 · 今日任务完成</span>
        <span class="finish-approval">H-6 视觉候选</span>
      </header>

      <section class="finish-paper">
        <div class="finish-tape" aria-hidden="true"></div>
        <div class="finish-celebration">
          <span class="finish-kicker">TODAY IS COMPLETE!</span>
          <div class="finish-bubble" role="status"><strong>真棒！</strong><span>母鸡妈妈陪你走到终点啦</span></div>
          <img class="finish-mother" src="/assets/f4/mother-thumbsup-f4-v1.png" alt="母鸡妈妈竖起大拇指夸奖小皮" />
          <i class="finish-star is-one" aria-hidden="true"></i><i class="finish-star is-two" aria-hidden="true"></i><i class="finish-star is-three" aria-hidden="true"></i>
        </div>

        <div class="finish-report">
          <p class="finish-report-kicker">TODAY'S LITTLE REPORT</p>
          <h1>今天的单词都完成啦！</h1>
          <p class="finish-report-note">每一次听、写和选择，都让新朋友记得更牢。</p>

          <div class="finish-stats" aria-label="今日学习战报">
            <section><small>认识新朋友</small><strong>4</strong><span>个单词</span></section>
            <section><small>复习老朋友</small><strong>6</strong><span>个单词</span></section>
            <section><small>连续学习</small><strong>3</strong><span>天</span></section>
          </div>

          <div class="finish-reward"><span class="finish-egg" aria-hidden="true"></span><p><strong>母鸡妈妈下了一颗新鸡蛋</strong><small>回到农场就能看到它。</small></p><b>+1</b></div>
          <button class="finish-return" type="button">回农场</button>
          <p class="finish-gentle-note">今天已经完成了，接下来轻松玩一会儿吧。</p>
        </div>
      </section>
    </main>
    <script src="./finish-candidate.js"></script>
  </body>
</html>
