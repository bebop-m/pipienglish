<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阶段 H-1 · 听看卡候选</title>
    <link rel="stylesheet" href="./intro-candidate.css" />
  </head>
  <body>
    <main class="lesson-candidate" aria-label="H-1 听看卡视觉候选">
      <div class="farm-wash" aria-hidden="true"></div>

      <header class="lesson-header">
        <button class="back-farm" type="button"><span class="back-chevron" aria-hidden="true"></span>回农场</button>
        <section class="story-progress" aria-label="今日学习进度 3 / 18">
          <div class="progress-copy"><strong>新朋友 · 第 1 步 / 3</strong><span>今日进度 3 / 18</span></div>
          <div class="progress-path"><span class="progress-fill"></span><span class="path-dot done"></span><span class="path-dot current"></span><span class="path-dot"></span><span class="path-dot"></span></div>
          <img class="progress-hen" src="/assets/f4/mother-f3.png" alt="母鸡妈妈正在向鸡窝走" />
          <img class="progress-home" src="/assets/f4/hatchery-empty-f4.png" alt="鸡窝" />
        </section>
        <span class="approval-chip">H-1 视觉候选</span>
      </header>

      <section class="lesson-paper">
        <div class="paper-pin" aria-hidden="true"></div>
        <div class="lesson-art">
          <span class="art-halo" aria-hidden="true"></span>
          <img src="/assets/f4/egg-f4-v2.png" alt="一颗手绘鸡蛋" />
          <span class="listen-note">先听两遍，再跟着读</span>
        </div>

        <div class="lesson-copy">
          <p class="step-kicker">HELLO, NEW FRIEND!</p>
          <div class="word-line"><h1>egg</h1><button class="listen-again" type="button"><span class="sound-mark" aria-hidden="true"><i></i><i></i><i></i></span>再听一次</button></div>
          <p class="phonetic">/eɡ/</p>
          <p class="meaning">鸡蛋</p>
          <div class="sentence-card">
            <p>The hen laid an egg!</p>
            <span>母鸡下了一颗蛋！</span>
          </div>
          <button class="primary-action" type="button">我认识它了！</button>
          <p class="gentle-tip">不用背下来，先和新朋友打个招呼。</p>
        </div>
      </section>
    </main>
  </body>
</html>
