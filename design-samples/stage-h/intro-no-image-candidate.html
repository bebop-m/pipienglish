<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阶段 H-1B · 无图听看卡候选</title>
    <link rel="stylesheet" href="./intro-candidate.css" />
    <link rel="stylesheet" href="./intro-no-image-candidate.css" />
  </head>
  <body>
    <main class="lesson-candidate" aria-label="H-1B 无图听看卡视觉候选">
      <div class="farm-wash" aria-hidden="true"></div>

      <header class="lesson-header">
        <button class="back-farm" type="button"><span class="back-chevron" aria-hidden="true"></span>回农场</button>
        <section class="story-progress" aria-label="今日学习进度 3 / 18">
          <div class="progress-copy"><strong>新朋友 · 第 1 步 / 3</strong><span>今日进度 3 / 18</span></div>
          <div class="progress-path"><span class="progress-fill"></span><span class="path-dot done"></span><span class="path-dot current"></span><span class="path-dot"></span><span class="path-dot"></span></div>
          <img class="progress-hen" src="/assets/f4/mother-f3.png" alt="母鸡妈妈正在向终点走" />
        </section>
        <span class="approval-chip">H-1B 无图候选</span>
      </header>

      <section class="lesson-paper no-art-paper">
        <div class="paper-pin" aria-hidden="true"></div>
        <div class="no-art-copy">
          <p class="step-kicker">HELLO, NEW FRIEND!</p>

          <div class="word-stage">
            <p class="listen-guide">先听一遍，再跟着读</p>
            <button class="listen-again" type="button"><span class="sound-mark" aria-hidden="true"><i></i><i></i><i></i></span>再听一次</button>
            <h1>because</h1>
            <div class="word-details"><span class="phonetic">/bɪˈkɒz/</span><span class="meaning">因为</span></div>
          </div>

          <button class="sentence-card sentence-button no-art-sentence" type="button" aria-label="播放例句：I stayed inside because it rained">
            <span class="sentence-label">放进句子里</span>
            <span class="sentence-speak"><span class="sound-mark" aria-hidden="true"><i></i><i></i><i></i></span>读句子</span>
            <strong class="sentence-en">I stayed inside <mark>because</mark> it rained.</strong>
            <span class="sentence-cn">因为下雨了，所以我待在屋里。</span>
          </button>

          <button class="primary-action" type="button">我认识它了！</button>
          <p class="gentle-tip">不用背下来，先听懂它在句子里的意思。</p>
        </div>
      </section>
    </main>
  </body>
</html>
