<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>V-2 · F4 首页文案排版候选</title>
    <link rel="stylesheet" href="/design-samples/sticker.css" />
    <link rel="stylesheet" href="/design-samples/sticker-f-farm-v3.css" />
    <link rel="stylesheet" href="/design-samples/sticker-f-farm-v4.css" />
    <link rel="stylesheet" href="./candidates.css" />
  </head>
  <body>
    <div class="candidate-viewport">
      <div class="candidate-bleed" aria-hidden="true"></div>
      <main class="candidate-stage sticker-app farm-app-f3 farm-app-f4" aria-label="V-2 F4 首页文案排版候选">
        <header class="sticker-topbar">
          <div class="sticker-brand"><span class="brand-face">🐤</span>皮皮 English</div>
          <div class="sticker-chip">今日单词 <strong data-today>0 / 4</strong></div>
          <div class="sticker-chip egg-stock-f4">
            <img src="/assets/f4/egg-f4-v2.png" alt="" /><span>鸡蛋</span><strong data-eggs>3</strong>
          </div>
          <div class="sticker-chip">小鸡 <strong data-chicks>18</strong></div>
          <div class="sticker-chip">孵化中 <strong data-incubating>1</strong></div>
          <button class="sticker-chip motion-toggle" type="button" aria-pressed="true">动效：开</button>
          <button class="parent-button" type="button">家长</button>
        </header>

        <section class="farm-stage-f3 farm-stage-f4" aria-label="文案排版所在的 F4 农场场景">
          <section class="task-board-f3" aria-labelledby="candidate-title">
            <p class="k-eyebrow" data-eyebrow>DAY 06 · 今日农场任务</p>
            <h1 id="candidate-title">开始今天的单词！</h1>
            <p class="k-copy" data-copy></p>
            <div class="progress-line">
              <span data-progress-label>今日进度</span>
              <span class="progress-track"><span data-progress-fill></span></span>
              <strong data-progress>0 / 16</strong>
            </div>
            <button class="k-button" type="button" data-primary></button>
            <div class="task-footer-f3" aria-label="预计用时、奖励和连续天数">
              <span data-minutes>约 10 分钟</span>
              <span data-reward>🥚 奖励 ×2</span>
              <span data-streak>连续第 6 天</span>
            </div>
          </section>

          <section class="hatchery-wrap-f4" aria-label="鸡蛋孵化区">
            <div class="hatchery-button-f4">
              <img class="hatchery-base-f4" src="/assets/f4/hatchery-empty-f4.png" alt="有三个独立巢位的孵化小屋" />
              <img class="hatchery-egg-f4 is-incubating" data-egg-slot="1" src="/assets/f4/egg-f4-v2.png" alt="正在孵化的鸡蛋" />
              <span class="hatchery-status-f4 candidate-hatchery-status"><strong>孵化小屋 · 1 颗孵化中</strong></span>
            </div>
          </section>

          <section class="rescue-wrap-f4" aria-label="等待救援的小鸡">
            <div class="rescue-entry-f4">
              <img src="/assets/f4/rescue-basket-f4.png" alt="在篮子里安全探头、等待救援的小鸡" />
              <span>待救 ×2</span>
            </div>
          </section>

          <div class="actor-f3 candidate-actor" data-kind="mother" style="left: 615px; top: 530px" aria-label="母鸡妈妈">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/mother-f3.png" alt="母鸡妈妈" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="farmer" style="left: 835px; top: 495px" aria-label="农场主小皮">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/xiaopi-f3.png" alt="农场主小皮" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="chick" style="left: 365px; top: 470px" aria-label="小鸡">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/chick-f3.png" alt="小鸡" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="chick" style="left: 475px; top: 650px" aria-label="小鸡">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/chick-f3.png" alt="小鸡" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="chick" style="left: 680px; top: 640px" aria-label="小鸡">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/chick-f3.png" alt="小鸡" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="chick" style="left: 925px; top: 650px" aria-label="小鸡">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/chick-f3.png" alt="小鸡" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="chick" style="left: 655px; top: 410px" aria-label="小鸡">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/chick-f3.png" alt="小鸡" /></span>
          </div>
          <div class="actor-f3 candidate-actor" data-kind="chick" style="left: 990px; top: 455px" aria-label="小鸡">
            <span class="sprite-shell-f3"><img class="sprite-f3" src="/assets/f4/chick-f3.png" alt="小鸡" /></span>
          </div>
        </section>

        <span class="sample-tag" data-candidate-label></span>
      </main>
    </div>
    <script src="./candidates.js"></script>
  </body>
</html>
